<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tics Physics Demo</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			background-color: #1a1a1a;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			overflow: hidden;
		}

		/* The canvas id must be 'canvas' for Emscripten to find it automatically */
		canvas.emscripten {
			border: none;
			background-color: #000;
			width: 100vw;
			height: 100vh;
			outline: none; /* Removes the white highlight ring when focused */
		}
	</style>
</head>

<body>
	<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

	<!-- Minimal Emscripten module setup -->
	<script type='text/javascript'>
		var canvas = document.getElementById('canvas');

		// Force the browser to focus the iframe window and canvas.
		// This routes keyboard events to Sokol correctly.
		canvas.addEventListener('click', function() {
			window.focus();
			canvas.focus();
		});

		// Focus early when the mouse enters the frame
		canvas.addEventListener('mouseenter', function() {
			window.focus();
			canvas.focus();
		});

		var Module = {
			canvas: canvas
		};
	</script>

	<!-- Emscripten will replace this tag with the actual JS code during compilation -->
	{{{ SCRIPT }}}
</body>

</html>
